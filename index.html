            <span id="missingCount" class="count">0 项</span>
          </div>
          <ul id="missingList" class="saved-list"></ul>
        </div>
      </div>
    </section>

    <section class="section" aria-labelledby="treeTitle">
      <h2 id="treeTitle">文件树</h2>
      <div id="tree" class="tree"></div>
    </section>
  </main>

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function fileKey(file) {
      return `${file.path} / ${file.name}`;
    }

    function cleanLines(text) {
      return Array.from(new Set(String(text)
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean)));
    }

    function resolveBackendEntry(text) {
      const value = String(text || "").trim();
      if (!value) return null;

      const lowerValue = value.toLocaleLowerCase();
      const exact = files.find((file) =>
        file.name.toLocaleLowerCase() === lowerValue ||
        fileKey(file).toLocaleLowerCase() === lowerValue
      );
      const partial = exact || files.find((file) =>
        file.name.toLocaleLowerCase().includes(lowerValue) ||
        fileKey(file).toLocaleLowerCase().includes(lowerValue)
      );

      if (partial) {
        return {
          name: partial.name,
          path: partial.path,
          key: fileKey(partial)
        };
      }

      return {
        name: value,
        path: "后台清单中未匹配到文件树",
        key: `backend:${value}`
      };
    }

    function uniqueEntries(entries) {
      const seen = new Set();
      return entries.filter((entry) => {
        if (!entry || seen.has(entry.key)) return false;
        seen.add(entry.key);
        return true;
      });
    }

    function buildBackendReview() {
      const wanted = uniqueEntries((BACKEND_REVIEW.wanted || []).map(resolveBackendEntry));
      const unwantedKeys = new Set(wanted.map((entry) => entry.key));
      const unwanted = uniqueEntries((BACKEND_REVIEW.unwanted || [])
        .map(resolveBackendEntry)
        .filter((entry) => entry && !unwantedKeys.has(entry.key)));

      return {
        wanted,
        unwanted,
        missing: cleanLines((BACKEND_REVIEW.missing || []).join("\n"))
      };
    }

    function highlight(value, term) {
      const text = String(value);
      if (!term) return escapeHtml(text);
      const lowerText = text.toLocaleLowerCase();
      const lowerTerm = term.toLocaleLowerCase();
      const index = lowerText.indexOf(lowerTerm);
      if (index < 0) return escapeHtml(text);
      return [
        escapeHtml(text.slice(0, index)),
        "<mark>",
        escapeHtml(text.slice(index, index + term.length)),
        "</mark>",
        escapeHtml(text.slice(index + term.length))
      ].join("");
    }

          path: pathParts.join(" / ")
        });
        return;

      node.children.forEach((child) => collectFiles(child, nextPath));

      missingCount.textContent = `${review.missing.length.toLocaleString("zh-CN")} 项`;
      renderSavedList("wanted", wantedList);
      renderSavedList("unwanted", unwantedList);
      renderMissingList();
    }

    collectFiles(INDEX_DATA.tree, []);
    treeRoot.appendChild(renderTreeNode(INDEX_DATA.tree));
    review = buildBackendReview();
    renderReview();

    query.addEventListener("input", renderSearch);
    clear.addEventListener("click", () => {
      query.value = "";
      query.focus();
      renderSearch();
    });
  </script>
</body>
</html>
